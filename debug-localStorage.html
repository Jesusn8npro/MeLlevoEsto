<!DOCTYPE html>
<html>
<head>
    <title>Debug localStorage - Favoritos</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .warning { background: #fff3cd; border-color: #ffeaa7; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .btn { padding: 10px 15px; margin: 5px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Debug localStorage - Favoritos</h1>
        
        <div class="section">
            <h2>Estado Actual del localStorage</h2>
            <div id="localStorage-status"></div>
        </div>
        
        <div class="section">
            <h2>Acciones de Prueba</h2>
            <button class="btn btn-success" onclick="agregarFavoritoPrueba()">Agregar Favorito de Prueba</button>
            <button class="btn btn-primary" onclick="verificarEstado()">Verificar Estado</button>
            <button class="btn btn-danger" onclick="limpiarFavoritos()">Limpiar Favoritos</button>
        </div>
        
        <div class="section">
            <h2>Logs de Actividad</h2>
            <div id="logs"></div>
        </div>
    </div>

    <script>
        function log(mensaje, tipo = 'info') {
            const logs = document.getElementById('logs');
            const timestamp = new Date().toLocaleTimeString();
            const color = tipo === 'error' ? 'red' : tipo === 'success' ? 'green' : 'blue';
            logs.innerHTML += `<div style="color: ${color}; margin: 5px 0;">[${timestamp}] ${mensaje}</div>`;
            logs.scrollTop = logs.scrollHeight;
        }
        
        function verificarEstado() {
            log('🔍 Verificando estado del localStorage...', 'info');
            
            const statusDiv = document.getElementById('localStorage-status');
            
            try {
                // Verificar todas las claves
                const todasLasClaves = Object.keys(localStorage);
                log(`📋 Claves encontradas en localStorage: ${todasLasClaves.length}`, 'info');
                
                // Verificar específicamente favoritos
                const favoritos = localStorage.getItem('favoritos');
                
                if (favoritos) {
                    const favoritosParseados = JSON.parse(favoritos);
                    log(`✅ Favoritos encontrados: ${favoritosParseados.length} productos`, 'success');
                    
                    statusDiv.innerHTML = `
                        <div class="success">
                            <h3>✅ Favoritos Encontrados</h3>
                            <p><strong>Cantidad:</strong> ${favoritosParseados.length}</p>
                            <p><strong>Estructura:</strong></p>
                            <pre>${JSON.stringify(favoritosParseados, null, 2)}</pre>
                        </div>
                    `;
                    
                    // Verificar estructura de cada favorito
                    favoritosParseados.forEach((fav, index) => {
                        log(`📦 Favorito ${index + 1}: ${fav.nombre || 'Sin nombre'} - ID: ${fav.producto_id || 'Sin ID'}`, 'info');
                    });
                    
                } else {
                    log('❌ No se encontraron favoritos en localStorage', 'error');
                    statusDiv.innerHTML = `
                        <div class="error">
                            <h3>❌ No hay favoritos</h3>
                            <p>El localStorage no contiene la clave 'favoritos'</p>
                            <p><strong>Todas las claves disponibles:</strong></p>
                            <pre>${JSON.stringify(todasLasClaves, null, 2)}</pre>
                        </div>
                    `;
                }
                
            } catch (error) {
                log(`❌ Error al verificar localStorage: ${error.message}`, 'error');
                statusDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        function agregarFavoritoPrueba() {
            log('➕ Agregando favorito de prueba...', 'info');
            
            try {
                let favoritos = JSON.parse(localStorage.getItem('favoritos') || '[]');
                
                const favoritoPrueba = {
                    id: Date.now().toString(),
                    producto_id: 999,
                    usuario_id: 'temp-user',
                    fecha_agregado: new Date().toISOString(),
                    nombre: 'Producto de Prueba',
                    precio: 99.99,
                    precio_oferta: null,
                    imagen: 'https://via.placeholder.com/300x300?text=Prueba',
                    disponible: true
                };
                
                favoritos.push(favoritoPrueba);
                localStorage.setItem('favoritos', JSON.stringify(favoritos));
                
                log('✅ Favorito de prueba agregado exitosamente', 'success');
                verificarEstado();
                
            } catch (error) {
                log(`❌ Error al agregar favorito: ${error.message}`, 'error');
            }
        }
        
        function limpiarFavoritos() {
            log('🗑️ Limpiando favoritos...', 'info');
            localStorage.removeItem('favoritos');
            log('✅ Favoritos eliminados', 'success');
            verificarEstado();
        }
        
        // Verificar estado al cargar la página
        window.onload = function() {
            log('🚀 Iniciando verificación...', 'info');
            verificarEstado();
        };
    </script>
</body>
</html>
